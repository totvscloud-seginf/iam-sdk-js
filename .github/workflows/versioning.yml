name: Versioning

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to version"
        required: true
        default: "react"
        type: choice
        options:
          - core
          - react
      version:
        description: "SemVer bump to apply"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      prerelease_identifier:
        description: "Pre-release identifier used for pre* versions"
        required: false
        default: "beta"
        type: string
      release_notes:
        description: "GitHub Release notes"
        required: false
        default: "Release generated by GitHub Actions."
        type: string

permissions:
  contents: write

concurrency:
  group: versioning-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Create version tag and GitHub Release
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve package
        id: package
        env:
          PACKAGE_INPUT: ${{ inputs.package }}
        run: |
          case "$PACKAGE_INPUT" in
            core)
              echo "workspace=packages/core" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=iam-sdk" >> "$GITHUB_OUTPUT"
              echo "package_name=@totvs-cloud/iam-sdk" >> "$GITHUB_OUTPUT"
              ;;
            react)
              echo "workspace=packages/react" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=iam-sdk-react" >> "$GITHUB_OUTPUT"
              echo "package_name=@totvs-cloud/iam-sdk-react" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: $PACKAGE_INPUT" >&2
              exit 1
              ;;
          esac

      - name: Resolve version
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version }}
          PREID: ${{ inputs.prerelease_identifier }}
          WORKSPACE: ${{ steps.package.outputs.workspace }}
          TAG_PREFIX: ${{ steps.package.outputs.tag_prefix }}
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
        run: |
          case "$VERSION_BUMP" in
            current)
              VERSION="$(node -p "require('./$WORKSPACE/package.json').version")"
              ;;
            prepatch|preminor|premajor|prerelease)
              npm version "$VERSION_BUMP" --workspace "$WORKSPACE" --preid "$PREID" --no-git-tag-version
              ;;
            patch|minor|major)
              npm version "$VERSION_BUMP" --workspace "$WORKSPACE" --no-git-tag-version
              ;;
            *)
              echo "Unsupported version bump: $VERSION_BUMP" >&2
              exit 1
              ;;
          esac

          VERSION="$(node -p "require('./$WORKSPACE/package.json').version")"
          TAG="$TAG_PREFIX@$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi

          if [[ "$VERSION_BUMP" != "current" ]]; then
            git add "$WORKSPACE/package.json" package-lock.json
            git commit -m "chore($TAG_PREFIX): release $VERSION"
          fi

          git tag "$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "workspace=$WORKSPACE"
            echo "package_name=$PACKAGE_NAME"
          } > release-metadata.env

      - name: Push version commit and tag
        env:
          VERSION_BUMP: ${{ inputs.version }}
        run: |
          if [[ "$VERSION_BUMP" == "current" ]]; then
            git push origin "${{ steps.bump.outputs.tag }}"
          else
            git push origin HEAD:main "${{ steps.bump.outputs.tag }}"
          fi

      - name: Check if gh CLI is installed
        run: |
          if ! command -v gh &> /dev/null; then
            echo "gh CLI not found. Installing..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          RELEASE_FLAGS=()
          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --title "$PACKAGE_NAME $VERSION" \
            --notes "$RELEASE_NOTES" \
            "${RELEASE_FLAGS[@]}"

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-metadata.env
          if-no-files-found: error
