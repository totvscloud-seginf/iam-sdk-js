name: Versioning

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer bump to apply"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      prerelease_identifier:
        description: "Pre-release identifier used for pre* versions"
        required: false
        default: "beta"
        type: string
      release_notes:
        description: "GitHub Release notes"
        required: false
        default: "Release generated by GitHub Actions."
        type: string

permissions:
  contents: write

concurrency:
  group: versioning-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Bump package version and create GitHub Release
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version }}
          PREID: ${{ inputs.prerelease_identifier }}
        run: |
          case "$VERSION_BUMP" in
            prepatch|preminor|premajor|prerelease)
              npm version "$VERSION_BUMP" --preid "$PREID"
              ;;
            patch|minor|major)
              npm version "$VERSION_BUMP"
              ;;
            *)
              echo "Unsupported version bump: $VERSION_BUMP" >&2
              exit 1
              ;;
          esac

          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          RELEASE_FLAGS=()
          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$RELEASE_NOTES" \
            "${RELEASE_FLAGS[@]}"
