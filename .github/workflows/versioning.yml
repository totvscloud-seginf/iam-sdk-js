name: Versioning

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer bump to apply"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      prerelease_identifier:
        description: "Pre-release identifier used for pre* versions"
        required: false
        default: "beta"
        type: string
      release_notes:
        description: "GitHub Release notes"
        required: false
        default: "Release generated by GitHub Actions."
        type: string

permissions:
  contents: write

concurrency:
  group: versioning-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Create version tag and GitHub Release
    runs-on: self-hosted
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version }}
          PREID: ${{ inputs.prerelease_identifier }}
        run: |
          case "$VERSION_BUMP" in
            current)
              VERSION="$(node -p "require('./package.json').version")"
              git tag "v$VERSION"
              ;;
            prepatch|preminor|premajor|prerelease)
              npm version "$VERSION_BUMP" --preid "$PREID"
              ;;
            patch|minor|major)
              npm version "$VERSION_BUMP"
              ;;
            *)
              echo "Unsupported version bump: $VERSION_BUMP" >&2
              exit 1
              ;;
          esac

          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        env:
          VERSION_BUMP: ${{ inputs.version }}
        run: |
          if [[ "$VERSION_BUMP" == "current" ]]; then
            git push origin "${{ steps.bump.outputs.tag }}"
          else
            git push origin HEAD:main --follow-tags
          fi

      - name: Check if gh CLI is installed
        run: |
          if ! command -v gh &> /dev/null; then
            echo "gh CLI not found. Installing..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          RELEASE_FLAGS=()
          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$RELEASE_NOTES" \
            "${RELEASE_FLAGS[@]}"
