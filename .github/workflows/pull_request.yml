name: Pull Request

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/core-manual-test/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm ci
        working-directory: examples/core-manual-test
      - run: npm run typecheck
        working-directory: examples/core-manual-test
      - run: npm run build
        working-directory: examples/core-manual-test
