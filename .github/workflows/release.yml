name: Release

on:
  push:
    branches:
      - main
      - development

jobs:
  publish:
    runs-on: ubuntu-latest # required Github-hosted runner for npm publish with --provenance
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: packages/core
            tag_prefix: iam-sdk
          - workspace: packages/react
            tag_prefix: iam-sdk-react
    concurrency:
      group: release-${{ github.ref_name }}-${{ matrix.tag_prefix }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Resolve next version
        id: release
        run: |
          node scripts/release/resolve-version.mjs \
            --workspace "${{ matrix.workspace }}" \
            --tag-prefix "${{ matrix.tag_prefix }}" \
            --branch "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        if: steps.release.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply package version
        if: steps.release.outputs.publish == 'true'
        run: npm version "${{ steps.release.outputs.version }}" --workspace "${{ matrix.workspace }}" --no-git-tag-version

      - name: Validate package contents
        if: steps.release.outputs.publish == 'true'
        run: npm publish --workspace "${{ matrix.workspace }}" --provenance --access public --tag "${{ steps.release.outputs.npm_tag }}" --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        if: steps.release.outputs.publish == 'true'
        run: npm publish --workspace "${{ matrix.workspace }}" --provenance --access public --tag "${{ steps.release.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release tag
        if: steps.release.outputs.publish == 'true'
        run: |
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.release.outputs.publish == 'true' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          gh release create "$TAG" \
            --verify-tag \
            --title "$PACKAGE_NAME $VERSION" \
            --notes "Published $PACKAGE_NAME@$VERSION to npm with the latest dist-tag."
